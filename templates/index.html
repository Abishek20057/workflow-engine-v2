<!DOCTYPE html>
<html>

<head>

<title>Workflow Automation Engine</title>
<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>Workflow Automation Engine</h1>

<div class="section">

<h2>Create Workflow</h2>

<select id="wf_type">

<option>Expense Approval</option>
<option>Leave Approval</option>
<option>Recruitment Process</option>
<option>Purchase Request</option>
<option>Bug Approval</option>
<option>HR Onboarding</option>
<option value="custom">Custom Workflow</option>

</select>

<input id="custom_name" placeholder="Custom Workflow Name">

<button onclick="createWorkflow()">Create Workflow</button>

</div>


<div class="section">

<h2>Add Step</h2>

<select id="workflow_select"></select>

<input id="step_name" placeholder="Example: Manager Approval">

<button onclick="addStep()">Add Step</button>

</div>


<div class="section">

<h2>Workflow Diagram</h2>

<div id="diagram">

<div class="node start">Start</div>

</div>

</div>


<div class="section">

<h2>Add Rule</h2>

<input id="rule_step" placeholder="Step ID">

<input id="rule_condition" placeholder="Example: amount > 1000">

<button onclick="addRule()">Add Rule</button>

</div>


<div class="section">

<h2>Execute Workflow</h2>

<input id="amount" placeholder="Enter amount">

<button onclick="executeWorkflow()">Execute</button>

</div>

</div>


<script>

async function loadWorkflows(){

let res = await fetch("/workflows")
let data = await res.json()

let select=document.getElementById("workflow_select")

select.innerHTML=""

data.forEach(w=>{

select.innerHTML+=`<option value="${w.id}">${w.name}</option>`

})

}

async function createWorkflow(){

let type=document.getElementById("wf_type").value

if(type=="custom"){
type=document.getElementById("custom_name").value
}

await fetch("/workflows",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:type})

})

alert("Workflow Created")

loadWorkflows()

}

async function addStep(){

let wf=document.getElementById("workflow_select").value

let name=document.getElementById("step_name").value

await fetch("/workflows/"+wf+"/steps",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name})

})

let diagram=document.getElementById("diagram")

diagram.innerHTML+=`<div class="node">${name}</div>`

}

async function addRule(){

let step=document.getElementById("rule_step").value
let condition=document.getElementById("rule_condition").value

await fetch("/steps/"+step+"/rules",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({condition:condition})

})

alert("Rule Added")

}

async function executeWorkflow(){

let amount=document.getElementById("amount").value

let res=await fetch("/execute",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount:Number(amount)})

})

let data=await res.json()

window.location.href="/approval.html?status="+data.status

}

loadWorkflows()

</script>

</body>
</html>
