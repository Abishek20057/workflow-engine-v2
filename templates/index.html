<!DOCTYPE html>
<html>

<head>

<title>Workflow Automation Engine</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>Workflow Automation Engine</h1>

<a href="/history"><button>View History</button></a>

<div class="section">

<h2>Create Workflow</h2>

<input id="wf_name" placeholder="Workflow Name">

<button onclick="createWorkflow()">Create</button>

</div>

<div class="section">

<h2>Execute Workflow</h2>

<select id="workflow_select">

{% for wf in workflows.values() %}

<option value="{{wf.id}}">{{wf.name}}</option>

{% endfor %}

</select>

<input id="amount" placeholder="Amount">

<button onclick="runWorkflow()">Run</button>

</div>

</div>

<script>

async function createWorkflow(){

let name=document.getElementById("wf_name").value

await fetch(`/workflow?name=${name}`,{method:"POST"})

location.reload()

}

async function runWorkflow(){

let wf=document.getElementById("workflow_select").value
let amount=document.getElementById("amount").value

let res=await fetch(`/execute/${wf}`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount:amount})
})

let html=await res.text()

document.open()
document.write(html)
document.close()

}

</script>

</body>

</html>
