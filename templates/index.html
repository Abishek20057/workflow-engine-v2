<!DOCTYPE html>
<html>
<head>
<title>Workflow System</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Workflow Automation System</h1>

<div class="navbar">
<button>Workflows</button>
<button>Dashboard</button>
<button>Settings</button>
<button>Logout</button>
</div>

<div class="card">

<h2>Workflow List</h2>

<input placeholder="Search workflows..." class="input">

<table>
<tr>
<th>Name</th>
<th>Action</th>
</tr>

<tbody id="workflow_list"></tbody>

</table>

</div>


<div class="card">

<h2>Create Workflow</h2>

<input id="wf_name" placeholder="Workflow Name" class="input">

<button onclick="createWorkflow()">Create</button>

</div>


<div class="card">

<h2>Start Workflow</h2>

<input id="exec_wf" placeholder="Workflow ID" class="input">
<input id="amount" placeholder="Amount" class="input">

<button onclick="runWorkflow()">Start</button>

</div>

<script src="/static/script.js"></script>

</body>
</html>
