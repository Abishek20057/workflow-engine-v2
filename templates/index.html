<!DOCTYPE html>
<html>
<head>
    <title>Workflow System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Workflow Automation System</h1>

<div class="nav">
    <button onclick="showTab('list')">Workflows</button>
    <button onclick="showTab('create')">Create</button>
    <button onclick="showTab('start')">Start</button>
    <button onclick="viewHistory()">History</button>
</div>

<!-- WORKFLOW LIST -->
<div id="list" class="tab">
    <h2>Workflow List</h2>

    <input placeholder="Search workflows...">

    <table id="workflowTable">
        <tr>
            <th>Workflow Name</th>
            <th>Action</th>
        </tr>
    </table>
</div>

<!-- CREATE -->
<div id="create" class="tab hidden">
    <h2>Create Workflow</h2>

    <input id="wfName" placeholder="Workflow Name">
    <button onclick="createWorkflow()">Create Workflow</button>
</div>

<!-- START -->
<div id="start" class="tab hidden">
    <h2>Start Workflow</h2>

    <select id="execWorkflow"></select>
    <input id="amount" placeholder="Amount">
    <input id="country" placeholder="Country">

    <button onclick="runWorkflow()">Start Workflow</button>

    <!-- VISUAL FLOW -->
    <div class="diagram">
        <div class="node start">Start</div>
        <div class="arrow">→</div>
        <div class="node">Manager Approval</div>
        <div class="arrow">→</div>
        <div class="node">Condition</div>
        <div class="arrow">→</div>
        <div class="node">Finance Approval</div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
