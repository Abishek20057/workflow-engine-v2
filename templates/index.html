<!DOCTYPE html>
<html>
<head>

<title>Workflow Automation Engine</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>Workflow Automation Engine</h1>

<a href="/history">
<button>View History</button>
</a>

<div class="section">

<h2>Create Workflow</h2>

<input id="workflow_name" placeholder="Workflow Name">

<button onclick="createWorkflow()">Create</button>

</div>

<div class="section">

<h2>Add Step</h2>

<select id="workflow_select">
<option>Expense Approval</option>
</select>

<input id="step_name" placeholder="Step Name">

<select id="step_type">

<option value="">Select Step Type</option>

<option value="approval">Approval</option>

<option value="task">Task</option>

<option value="notification">Notification</option>

</select>

<input id="order" placeholder="Order">

<button onclick="addStep()">Add Step</button>

</div>

<div class="section">

<h2>Add Rule</h2>

<select id="step_id">

<option>Manager Approval</option>

<option>Finance Approval</option>

</select>

<input id="condition" placeholder="Condition (amount > 1000)">

<select id="next_step">

<option>Manager Approval</option>

<option>Finance Approval</option>

</select>

<input id="priority" placeholder="Priority">

<button onclick="addRule()">Add Rule</button>

</div>

<div class="section">

<h2>Execute Workflow</h2>

<select id="workflow_exec">

<option>Expense Approval</option>

</select>

<input id="amount" placeholder="Amount">

<button onclick="runWorkflow()">Run</button>

</div>

</div>

<script>

async function createWorkflow(){

let name=document.getElementById("workflow_name").value

await fetch("/workflow?name="+name,{method:"POST"})

alert("Workflow Created")

}

async function addStep(){

let wf=document.getElementById("workflow_select").value

let name=document.getElementById("step_name").value

let type=document.getElementById("step_type").value

let order=document.getElementById("order").value

await fetch(`/step?workflow_id=${wf}&name=${name}&step_type=${type}&order=${order}`,{method:"POST"})

alert("Step Added")

}

async function addRule(){

let step=document.getElementById("step_id").value

let cond=document.getElementById("condition").value

let next=document.getElementById("next_step").value

let pri=document.getElementById("priority").value

await fetch(`/rule?step_id=${step}&condition=${cond}&next_step_id=${next}&priority=${pri}`,{method:"POST"})

alert("Rule Added")

}

function runWorkflow(){

let wf=document.getElementById("workflow_exec").value

let amount=document.getElementById("amount").value

window.location.href=`/execute/${wf}?amount=${amount}`

}

</script>

</body>

</html>
