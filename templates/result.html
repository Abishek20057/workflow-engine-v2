<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Workflow Result</h1>

<div class="result-box">

    <p class="start"> Workflow Started</p>

    {% for log in logs %}
        <p class="step">➡ {{ log }}</p>
    {% endfor %}

    <p class="done">Workflow Completed</p>

</div>

<br>
<a href="/">Back</a>

</body>
</html>
