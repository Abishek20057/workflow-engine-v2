<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1 style="text-align:center">Execution History</h1>

<table>

<tr>

<th>Workflow</th>
<th>Input</th>
<th>Path</th>

</tr>

{% for h in history %}

<tr>

<td>{{h.workflow}}</td>
<td>{{h.input}}</td>
<td>{{h.path}}</td>

</tr>

{% endfor %}

</table>

</body>
</html>
