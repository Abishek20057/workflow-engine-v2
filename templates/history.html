<!DOCTYPE html>
<html>

<head>

<title>Execution History</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1>Execution History</h1>

<table>

<tr>
<th>Workflow</th>
<th>Input</th>
<th>Path</th>
</tr>

{% for h in history %}

<tr>
<td>{{h.workflow}}</td>
<td>{{h.input}}</td>
<td>{{h.path}}</td>
</tr>

{% endfor %}

</table>

<a href="/">Back</a>

</body>

</html>
