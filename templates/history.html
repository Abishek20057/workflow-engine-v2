<!DOCTYPE html>

<html>

<head>

<title>Execution History</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1 style="text-align:center">Execution History</h1>

<table>

<tr>

<th>Workflow</th>

<th>Input</th>

<th>Path</th>

</tr>

{% for item in history %}

<tr>

<td>{{item.workflow}}</td>

<td>{{item.input}}</td>

<td>{{item.path}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
