<!DOCTYPE html>

<html>

<head>

<title>Workflow Automation Engine</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Workflow Automation Engine</h1>

<div class="section help">

<h3>How To Use</h3>

<p>1️⃣ Create Workflow</p>
<p>2️⃣ Add Steps</p>
<p>3️⃣ Define Rules</p>
<p>4️⃣ Execute Workflow</p>

</div>

<div class="section">

<h2>Create Workflow</h2>

<label>Workflow Name</label>

<input id="wf_name" placeholder="Example: Expense Approval">

<button onclick="createWorkflow()">Create Workflow</button>

</div>

<div class="section">

<h2>Add Step</h2>

<label>Select Workflow</label>

<select id="step_workflow"></select>

<label>Step Name</label>

<input id="step_name" placeholder="Example: Manager Approval">

<label>Step Type</label>

<select id="step_type">

<option value="task">Task</option>
<option value="approval">Approval</option>
<option value="notification">Notification</option>

</select>

<label>Step Order</label>

<input id="step_order">

<button onclick="addStep()">Add Step</button>

</div>

<div class="section">

<h2>Workflow Diagram</h2>

<div id="diagram">

<div class="step-box start">Start</div>

</div>

</div>

<div class="section">

<h2>Add Rule</h2>

<label>Step ID</label>

<input id="rule_step">

<label>Condition</label>

<select id="condition_field">
<option value="amount">amount</option>
</select>

<select id="condition_operator">
<option value=">">></option>
<option value="<"><</option>
<option value="==">==</option>
</select>

<input id="condition_value" placeholder="1000">

<label>Next Step ID</label>

<input id="rule_next">

<label>Priority</label>

<input id="rule_priority">

<button onclick="addRule()">Add Rule</button>

</div>

<div class="section">

<h2>Execute Workflow</h2>

<label>Select Workflow</label>

<select id="exec_workflow"></select>

<label>Enter Amount</label>

<input id="amount">

<button onclick="executeWorkflow()">Execute Workflow</button>

</div>

</div>

<script>

async function loadWorkflows(){

let res = await fetch("/workflows")
let data = await res.json()

let dropdown = document.getElementById("step_workflow")
let exec = document.getElementById("exec_workflow")

dropdown.innerHTML=""
exec.innerHTML=""

data.forEach(w=>{

dropdown.innerHTML+=`<option value="${w.id}">${w.name}</option>`
exec.innerHTML+=`<option value="${w.id}">${w.name}</option>`

})

}



function addStepVisual(name){

let diagram=document.getElementById("diagram")

let arrow=document.createElement("div")
arrow.className="arrow"
arrow.innerHTML="➡"

let step=document.createElement("div")
step.className="step-box"
step.innerText=name

diagram.appendChild(arrow)
diagram.appendChild(step)

}



async function createWorkflow(){

let name=document.getElementById("wf_name").value

await fetch("/workflows",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name})

})

alert("Workflow Created")

loadWorkflows()

}



async function addStep(){

let wf=document.getElementById("step_workflow").value
let name=document.getElementById("step_name").value
let type=document.getElementById("step_type").value
let order=document.getElementById("step_order").value

await fetch("/workflows/"+wf+"/steps",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

name:name,
step_type:type,
order:Number(order)

})

})

addStepVisual(name)

alert("Step Added")

}



async function addRule(){

let step=document.getElementById("rule_step").value

let field=document.getElementById("condition_field").value
let operator=document.getElementById("condition_operator").value
let value=document.getElementById("condition_value").value

let condition=field+" "+operator+" "+value

let next=document.getElementById("rule_next").value
let priority=document.getElementById("rule_priority").value

await fetch("/steps/"+step+"/rules",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

condition:condition,
next_step_id:Number(next),
priority:Number(priority)

})

})

alert("Rule Added")

}



async function executeWorkflow(){

let wf=document.getElementById("exec_workflow").value
let amount=document.getElementById("amount").value

let res=await fetch("/workflows/"+wf+"/execute",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

data:{amount:Number(amount)}

})

})

let data=await res.json()

let status="pending"

if(data.logs.join().includes("Approved")){
status="approved"
}

window.location.href="/approval.html?status="+status

}

loadWorkflows()

</script>

</body>
</html>
