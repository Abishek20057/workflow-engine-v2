<!DOCTYPE html><html><head><title>Workflow Automation Engine</title><style>

body{
font-family: Arial;
background: linear-gradient(120deg,#141e30,#243b55);
color:white;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

.section{
background:#1f4068;
padding:20px;
margin-bottom:25px;
border-radius:10px;
}

h1{
text-align:center;
}

input,select{
padding:10px;
margin:8px 0;
width:100%;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#00c6ff;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00a3cc;
}

label{
font-weight:bold;
}

.help{
background:#0f3460;
padding:15px;
border-radius:8px;
margin-bottom:20px;
}

/* Visual Workflow */

#diagram{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-top:15px;
}

.step-box{
background:#00c6ff;
color:black;
padding:12px 20px;
border-radius:8px;
font-weight:bold;
animation:flow 0.6s ease;
}

.arrow{
font-size:22px;
padding-top:10px;
}

@keyframes flow{
0%{
transform:translateY(-20px);
opacity:0;
}
100%{
transform:translateY(0);
opacity:1;
}
}

</style></head><body><div class="container"><h1>Workflow Automation Engine</h1><div class="help"><h3>How To Use</h3><p>1️⃣ Create Workflow</p>
<p>2️⃣ Add Steps (Example: Manager Approval)</p>
<p>3️⃣ Define Rules (Example: amount > 1000)</p>
<p>4️⃣ Execute Workflow</p></div><div class="section"><h2>Create Workflow</h2><label>Workflow Name</label>

<input id="wf_name" placeholder="Example: Expense Approval / Leave Request"><button onclick="createWorkflow()">Create Workflow</button>

</div><div class="section"><h2>Add Step</h2><label>Select Workflow</label>

<select id="step_workflow"></select>

<label>Step Name</label>

<input id="step_name" placeholder="Example: Manager Approval"><label>Step Type</label>

<select id="step_type"><option value="task">Task</option>
<option value="approval">Approval</option>
<option value="notification">Notification</option></select><label>Step Order</label>

<input id="step_order" placeholder="Example: 1"><button onclick="addStep()">Add Step</button>

</div><div class="section"><h2>Workflow Diagram</h2><div id="diagram"></div></div><div class="section"><h2>Add Rule</h2><label>Step ID</label>

<input id="rule_step" placeholder="Example: step_id"><label>Condition</label>

<input id="rule_condition" placeholder="Example: amount > 1000"><label>Next Step ID</label>

<input id="rule_next" placeholder="Example: next_step_id"><label>Priority</label>

<input id="rule_priority" placeholder="Example: 1"><button onclick="addRule()">Add Rule</button>

</div><div class="section"><h2>Execute Workflow</h2><label>Select Workflow</label>

<select id="exec_workflow"></select>

<label>Enter Amount</label>

<input id="amount" placeholder="Example: 1200"><button onclick="executeWorkflow()">Execute Workflow</button>

</div></div><script>

async function loadWorkflows(){

let res = await fetch("/workflows")
let data = await res.json()

let dropdown = document.getElementById("step_workflow")
let exec = document.getElementById("exec_workflow")

dropdown.innerHTML=""
exec.innerHTML=""

data.forEach(w=>{

dropdown.innerHTML+=`<option value="${w.id}">${w.name}</option>`
exec.innerHTML+=`<option value="${w.id}">${w.name}</option>`

})

}



function addStepVisual(name){

let diagram=document.getElementById("diagram")

if(diagram.children.length>0){
diagram.innerHTML+=`<div class="arrow">➜</div>`
}

diagram.innerHTML+=`<div class="step-box">${name}</div>`

}



async function createWorkflow(){

let name=document.getElementById("wf_name").value

await fetch("/workflows",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:name})

})

alert("Workflow Created")

loadWorkflows()

}



async function addStep(){

let wf=document.getElementById("step_workflow").value
let name=document.getElementById("step_name").value
let type=document.getElementById("step_type").value
let order=document.getElementById("step_order").value

await fetch("/workflows/"+wf+"/steps",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

name:name,
step_type:type,
order:Number(order)

})

})

addStepVisual(name)

alert("Step Added")

}



async function addRule(){

let step=document.getElementById("rule_step").value
let condition=document.getElementById("rule_condition").value
let next=document.getElementById("rule_next").value
let priority=document.getElementById("rule_priority").value

await fetch("/steps/"+step+"/rules",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

condition:condition,
next_step_id:next,
priority:Number(priority)

})

})

alert("Rule Added")

}



async function executeWorkflow(){

let wf=document.getElementById("exec_workflow").value
let amount=document.getElementById("amount").value

let res=await fetch("/workflows/"+wf+"/execute",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

data:{amount:Number(amount)}

})

})

let data=await res.json()

let status="pending"

if(data.logs.join().includes("Approved")){
status="approved"
}

window.location.href="/approval.html?status="+status

}

loadWorkflows()

</script></body>
</html>
